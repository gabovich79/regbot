services:
  - type: web
    name: regbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --preload --log-level info
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: MAX_TOKENS_WARNING
        value: "150000"
      - key: CACHE_TTL_MINUTES
        value: "5"
    disk:
      name: regbot-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
